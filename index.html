<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#101827">
  <title>Word Car Game</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <main id="app">
    <div id="game-container" aria-label="Word Car Game"></div>

    <section id="quiz-overlay" class="overlay" aria-modal="true" aria-labelledby="quiz-title">
      <div class="panel quiz-panel">
        <p id="quiz-grade" class="eyebrow"></p>
        <h2 id="quiz-title">알맞은 단어를 고르세요</h2>
        <div id="quiz-emoji" aria-hidden="true"></div>
        <p id="quiz-hint"></p>
        <div class="timer-track" aria-hidden="true">
          <div id="quiz-timer-bar"></div>
        </div>
        <div id="quiz-choices" role="group" aria-label="단어 선택지"></div>
        <p id="quiz-feedback" aria-live="polite"></p>
      </div>
    </section>

    <section id="score-overlay" class="overlay" aria-modal="true" aria-labelledby="score-title">
      <form id="score-form" class="panel score-panel">
        <p class="eyebrow">GAME OVER</p>
        <h2 id="score-title">점수 등록</h2>
        <p id="score-summary"></p>
        <label for="player-name">이름</label>
        <input id="player-name" name="playerName" maxlength="10" autocomplete="nickname" required>
        <div class="form-actions">
          <button type="submit">점수 저장</button>
          <button id="score-skip" type="button" class="secondary">건너뛰기</button>
        </div>
      </form>
    </section>

    <aside id="rotate-notice">
      <strong>화면을 가로로 돌려주세요</strong>
      <span>가로 화면에서 더 편하게 플레이할 수 있습니다.</span>
    </aside>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/phaser@3.90.0/dist/phaser.min.js"></script>
  <script src="src/data/words.js"></script>
  <script src="src/data/stages.js"></script>
  <script src="src/storage.js"></script>
  <script src="src/objects/Car.js"></script>
  <script src="src/objects/Obstacle.js"></script>
  <script src="src/objects/WordItem.js"></script>
  <script src="src/scenes/QuizScene.js"></script>
  <script src="src/scenes/BootScene.js"></script>
  <script src="src/scenes/MenuScene.js"></script>
  <script src="src/scenes/GameScene.js"></script>
  <script src="src/scenes/ScoreScene.js"></script>
  <script src="src/main.js"></script>
</body>
</html>
